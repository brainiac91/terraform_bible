name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install httpx

    - name: Run Unit Tests
      run: |
        # We need to set PYTHONPATH to include the current directory so app.main can be found
        export PYTHONPATH=$PYTHONPATH:.
        pytest app/test_main.py

    - name: Build Docker Image
      run: |
        docker build -t devops-learning-app:${{ github.sha }} .

    # In a real scenario, we would push to a registry here
    # - name: Login to Docker Hub
    #   uses: docker/login-action@v2
    #   ...
    # - name: Push Docker Image
    #   run: docker push ...

  terraform-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true # Don't fail just for formatting in this learning project

    - name: Terraform Init
      run: |
        cd terraform
        terraform init -backend=false

    - name: Terraform Validate
      run: |
        cd terraform
        terraform validate
