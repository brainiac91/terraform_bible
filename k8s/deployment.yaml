apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-learning-app
  labels:
    app: devops-learning-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-learning-app
  template:
    metadata:
      labels:
        app: devops-learning-app
    spec:
      containers:
      - name: devops-learning-app
        image: devops-learning-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 3
